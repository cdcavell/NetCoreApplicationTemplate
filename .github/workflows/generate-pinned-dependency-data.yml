name: Stage Locked Workflow Definitions

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  stage:
    name: Stage locked workflow definitions
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Generate locked workflow copies
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .workflow-updates
          mkdir -p .workflow-updates

          python3 <<'PY'
          from pathlib import Path

          source_root = Path('.github/workflows')
          target_root = Path('.workflow-updates')

          for source in source_root.glob('*.yml'):
              if source.name == 'generate-pinned-dependency-data.yml':
                  continue

              text = source.read_text()
              lines = []
              for line in text.splitlines():
                  if 'dotnet restore ' in line and '--locked-mode' not in line:
                      line = f'{line} --locked-mode'
                  line = line.replace(
                      'github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4',
                      'github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0')
                  line = line.replace(
                      'github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4',
                      'github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0')
                  lines.append(line)

              (target_root / source.name).write_text('\n'.join(lines) + '\n')
          PY

      - name: Commit staged workflow copies
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .workflow-updates

          if git diff --cached --quiet; then
            echo "Workflow copies are already staged."
            exit 0
          fi

          git commit -m "chore(ci): stage locked workflow definitions"
          git push
