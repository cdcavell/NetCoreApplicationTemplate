name: CI

on:
  pull_request:
    branches:
      - main

  push:
    branches-ignore:
      - main

  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_VERSION: '10.0.x'
  CONFIGURATION: Release
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-validation:
    name: Build validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Display .NET information
        run: dotnet --info

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --configuration ${{ env.CONFIGURATION }} --no-restore

      # Optional: enable later once formatting/analyzer noise is cleaned up.
      - name: Verify formatting
        run: dotnet format --verify-no-changes --verbosity minimal

      - name: Run tests
        shell: pwsh
        run: |
          $testProjects = Get-ChildItem -Path . -Recurse -Filter *.csproj | Where-Object {
              $content = Get-Content $_.FullName -Raw
              $_.BaseName -match 'Tests?$' -or $content -match 'Microsoft\.NET\.Test\.Sdk'
          }

          if (-not $testProjects) {
              Write-Host "No test projects found. Skipping dotnet test."
              return
          }

          foreach ($project in $testProjects) {
              Write-Host "Running tests for $($project.FullName)"
              dotnet test $project.FullName --configuration $env:CONFIGURATION --no-restore --verbosity normal
          }

  codeql-analysis:
    name: CodeQL analysis
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: 'csharp,javascript'
          build-mode: none

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution for CodeQL
        run: dotnet build --configuration ${{ env.CONFIGURATION }} --no-restore

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
