name: Format Issue 369 Branch

on:
  push:
    branches:
      - agent/issue-369-audit-completion-outbox

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore ./NetCoreApplicationTemplate.slnx

      - name: Apply formatting
        run: dotnet format ./NetCoreApplicationTemplate.slnx --no-restore --verbosity diagnostic

      - name: Commit formatting changes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No formatting changes were required."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "Apply dotnet formatting for issue 369"
          git push origin HEAD:agent/issue-369-audit-completion-outbox
