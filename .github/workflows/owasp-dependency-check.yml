# This workflow uses actions that are not certified by GitHub. They are provided
# by a third party and governed by separate terms, privacy policies, and support.
# OWASP Dependency-Check scans the restored NuGet dependency graph and uploads
# SARIF results to GitHub code scanning.

name: OWASP Dependency-Check software composition analysis

on:
  workflow_dispatch:
  schedule:
    - cron: '30 9 * * 0'
  push:
    branches:
      - main
    paths:
      - '**/*.csproj'
      - '**/*.sln'
      - '**/*.slnx'
      - '**/packages.config'
      - '**/packages.lock.json'
      - '**/packages.*.lock.json'
      - '**/Directory.Packages.props'
      - '**/Directory.Build.props'
      - 'dependency-check-suppressions.xml'
      - '.github/workflows/owasp-dependency-check.yml'

  pull_request:
    paths:
      - '**/*.csproj'
      - '**/*.sln'
      - '**/*.slnx'
      - '**/packages.config'
      - '**/packages.lock.json'
      - '**/packages.*.lock.json'
      - '**/Directory.Packages.props'
      - '**/Directory.Build.props'
      - 'dependency-check-suppressions.xml'
      - '.github/workflows/owasp-dependency-check.yml'

permissions: {}

jobs:
  dependency-check:
    name: Analyze dependencies with OWASP Dependency-Check
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore ./NetCoreApplicationTemplate.slnx --locked-mode

      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@75ba02d6183445fe0761d26e836bde58b1560600 # 1.1.0
        with:
          project: 'NetCoreApplicationTemplate'
          path: '.'
          format: 'ALL'
          others: '--suppression=/github/workspace/dependency-check-suppressions.xml'

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dependency-check-report
          path: reports/
          retention-days: 5
          if-no-files-found: warn

      - name: Upload results to code-scanning
        if: always() && hashFiles('reports/dependency-check-report.sarif') != ''
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: reports/dependency-check-report.sarif
          category: dependency-check
