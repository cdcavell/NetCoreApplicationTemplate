name: Apply Issue 374 Refactor

on:
  push:
    branches:
      - agent/issue-374-context-audit-state-active

permissions:
  contents: write

jobs:
  refactor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: agent/issue-374-context-audit-state-active
          fetch-depth: 0

      - name: Apply context-isolation refactor
        shell: python
        run: |
          from pathlib import Path

          pipeline_path = Path("src/ProjectTemplate.Infrastructure/Data/ApplicationSaveChangesPipeline.cs")
          text = pipeline_path.read_text(encoding="utf-8-sig")

          def replace_once(old: str, new: str) -> None:
              global text
              if text.count(old) != 1:
                  raise SystemExit(f"Expected exactly one match, found {text.count(old)} for:\n{old}")
              text = text.replace(old, new, 1)

          replace_once(
              "using Microsoft.EntityFrameworkCore;\n",
              "using System.Runtime.CompilerServices;\nusing Microsoft.EntityFrameworkCore;\n")
          replace_once(
              "    IApplicationSaveChangesPipeline,\n    IApplicationMutationAuditReceiptAccessor\n",
              "    IApplicationSaveChangesPipeline,\n    IApplicationMutationAuditReceiptAccessor,\n    IApplicationMutationAuditReceiptRegistry\n")
          replace_once(
              "    private readonly IApplicationAuditStore _auditStore;\n    private List<AuditEntry> _pendingAuditEntries = [];\n    private readonly List<AuditRecord> _activeAuditRecords = [];\n    private ApplicationAuditContext? _activeAuditContext;\n    private string? _activeMutationBatchId;\n    private int _activeAuditRecordCount;\n",
              "    private readonly IApplicationAuditStore _auditStore;\n    private readonly ConditionalWeakTable<ApplicationDbContext, ApplicationSaveChangesState> _contextStates = new();\n    private readonly object _lastCompletedReceiptLock = new();\n    private ApplicationMutationAuditReceipt? _lastCompletedReceipt;\n")
          replace_once(
              "    public ApplicationMutationAuditReceipt? LastCompletedReceipt { get; private set; }\n",
              "    public ApplicationMutationAuditReceipt? LastCompletedReceipt\n    {\n        get\n        {\n            lock (_lastCompletedReceiptLock)\n            {\n                return _lastCompletedReceipt;\n            }\n        }\n    }\n\n    /// <inheritdoc />\n    public ApplicationMutationAuditReceipt? GetLastCompletedReceipt(ApplicationDbContext dbContext)\n    {\n        ArgumentNullException.ThrowIfNull(dbContext);\n        return _contextStates.TryGetValue(dbContext, out ApplicationSaveChangesState? state)\n            ? state.LastCompletedReceipt\n            : null;\n    }\n")
          replace_once(
              "        ArgumentNullException.ThrowIfNull(dbContext);\n        ResetActiveAuditState();\n\n        IReadOnlyList<EntityEntry> entries = GetSavePipelineEntries(dbContext);",
              "        ArgumentNullException.ThrowIfNull(dbContext);\n        ApplicationSaveChangesState state = GetContextState(dbContext);\n        ResetActiveAuditState(state);\n\n        IReadOnlyList<EntityEntry> entries = GetSavePipelineEntries(dbContext);")
          replace_once(
              "            _pendingAuditEntries = OnBeforeSaveChanges(dbContext, entries);",
              "            state.PendingAuditEntries = OnBeforeSaveChanges(dbContext, entries, state);")
          replace_once(
              "        cancellationToken.ThrowIfCancellationRequested();\n        ResetActiveAuditState();\n\n        IReadOnlyList<EntityEntry> entries = GetSavePipelineEntries(dbContext);",
              "        cancellationToken.ThrowIfCancellationRequested();\n        ApplicationSaveChangesState state = GetContextState(dbContext);\n        ResetActiveAuditState(state);\n\n        IReadOnlyList<EntityEntry> entries = GetSavePipelineEntries(dbContext);")
          replace_once(
              "            _pendingAuditEntries = await OnBeforeSaveChangesAsync(\n                    dbContext,\n                    entries,\n                    cancellationToken)",
              "            state.PendingAuditEntries = await OnBeforeSaveChangesAsync(\n                    dbContext,\n                    entries,\n                    state,\n                    cancellationToken)")
          replace_once(
              "        ArgumentNullException.ThrowIfNull(dbContext);\n        bool appendedAdditionalAuditRecords = false;\n\n        foreach (AuditEntry auditEntry in _pendingAuditEntries)",
              "        ArgumentNullException.ThrowIfNull(dbContext);\n        ApplicationSaveChangesState state = GetContextState(dbContext);\n        bool appendedAdditionalAuditRecords = false;\n\n        foreach (AuditEntry auditEntry in state.PendingAuditEntries)")
          replace_once(
              "            AppendAuditRecord(dbContext, auditEntry.ToAuditRecord());",
              "            AppendAuditRecord(dbContext, auditEntry.ToAuditRecord(), state);")
          replace_once(
              "        CompleteMutationReceipt();\n        _pendingAuditEntries = [];",
              "        CompleteMutationReceipt(state);\n        state.PendingAuditEntries = [];")
          replace_once(
              "        cancellationToken.ThrowIfCancellationRequested();\n        bool appendedAdditionalAuditRecords = false;\n\n        foreach (AuditEntry auditEntry in _pendingAuditEntries)",
              "        cancellationToken.ThrowIfCancellationRequested();\n        ApplicationSaveChangesState state = GetContextState(dbContext);\n        bool appendedAdditionalAuditRecords = false;\n\n        foreach (AuditEntry auditEntry in state.PendingAuditEntries)")
          replace_once(
              "            await AppendAuditRecordAsync(dbContext, auditEntry.ToAuditRecord(), cancellationToken)",
              "            await AppendAuditRecordAsync(dbContext, auditEntry.ToAuditRecord(), state, cancellationToken)")
          replace_once(
              "        CompleteMutationReceipt();\n        _pendingAuditEntries = [];",
              "        CompleteMutationReceipt(state);\n        state.PendingAuditEntries = [];")
          replace_once(
              "    private void ResetActiveAuditState()\n    {\n        _pendingAuditEntries = [];\n        _activeAuditRecords.Clear();\n        _activeAuditContext = null;\n        _activeMutationBatchId = null;\n        _activeAuditRecordCount = 0;\n    }\n",
              "    private ApplicationSaveChangesState GetContextState(ApplicationDbContext dbContext)\n    {\n        return _contextStates.GetValue(dbContext, static _ => new ApplicationSaveChangesState());\n    }\n\n    private static void ResetActiveAuditState(ApplicationSaveChangesState state)\n    {\n        state.PendingAuditEntries = [];\n        state.ActiveAuditRecords.Clear();\n        state.ActiveAuditContext = null;\n        state.ActiveMutationBatchId = null;\n        state.ActiveAuditRecordCount = 0;\n    }\n")
          replace_once(
              "    private List<AuditEntry> OnBeforeSaveChanges(\n        ApplicationDbContext dbContext,\n        IEnumerable<EntityEntry> entries)\n    {\n        List<AuditEntry> auditEntries = CreateAuditEntries(entries);",
              "    private List<AuditEntry> OnBeforeSaveChanges(\n        ApplicationDbContext dbContext,\n        IEnumerable<EntityEntry> entries,\n        ApplicationSaveChangesState state)\n    {\n        List<AuditEntry> auditEntries = CreateAuditEntries(entries, state);")
          replace_once(
              "            AppendAuditRecord(dbContext, auditEntry.ToAuditRecord());",
              "            AppendAuditRecord(dbContext, auditEntry.ToAuditRecord(), state);")
          replace_once(
              "    private async ValueTask<List<AuditEntry>> OnBeforeSaveChangesAsync(\n        ApplicationDbContext dbContext,\n        IEnumerable<EntityEntry> entries,\n        CancellationToken cancellationToken)\n    {\n        List<AuditEntry> auditEntries = CreateAuditEntries(entries);",
              "    private async ValueTask<List<AuditEntry>> OnBeforeSaveChangesAsync(\n        ApplicationDbContext dbContext,\n        IEnumerable<EntityEntry> entries,\n        ApplicationSaveChangesState state,\n        CancellationToken cancellationToken)\n    {\n        List<AuditEntry> auditEntries = CreateAuditEntries(entries, state);")
          replace_once(
              "            await AppendAuditRecordAsync(dbContext, auditEntry.ToAuditRecord(), cancellationToken)",
              "            await AppendAuditRecordAsync(dbContext, auditEntry.ToAuditRecord(), state, cancellationToken)")
          replace_once(
              "    private void AppendAuditRecord(ApplicationDbContext dbContext, AuditRecord auditRecord)\n    {\n        _auditStore.Append(dbContext, auditRecord);\n        _activeAuditRecords.Add(auditRecord);\n    }",
              "    private void AppendAuditRecord(\n        ApplicationDbContext dbContext,\n        AuditRecord auditRecord,\n        ApplicationSaveChangesState state)\n    {\n        _auditStore.Append(dbContext, auditRecord);\n        state.ActiveAuditRecords.Add(auditRecord);\n    }")
          replace_once(
              "    private async ValueTask AppendAuditRecordAsync(\n        ApplicationDbContext dbContext,\n        AuditRecord auditRecord,\n        CancellationToken cancellationToken)\n    {\n        await _auditStore.AppendAsync(dbContext, auditRecord, cancellationToken).ConfigureAwait(false);\n        _activeAuditRecords.Add(auditRecord);\n    }",
              "    private async ValueTask AppendAuditRecordAsync(\n        ApplicationDbContext dbContext,\n        AuditRecord auditRecord,\n        ApplicationSaveChangesState state,\n        CancellationToken cancellationToken)\n    {\n        await _auditStore.AppendAsync(dbContext, auditRecord, cancellationToken).ConfigureAwait(false);\n        state.ActiveAuditRecords.Add(auditRecord);\n    }")
          replace_once(
              "    private List<AuditEntry> CreateAuditEntries(IEnumerable<EntityEntry> entries)",
              "    private List<AuditEntry> CreateAuditEntries(\n        IEnumerable<EntityEntry> entries,\n        ApplicationSaveChangesState state)")
          replace_once(
              "            _activeAuditContext = auditContext;\n            _activeMutationBatchId = mutationBatchId;\n            _activeAuditRecordCount = auditEntries.Count;",
              "            state.ActiveAuditContext = auditContext;\n            state.ActiveMutationBatchId = mutationBatchId;\n            state.ActiveAuditRecordCount = auditEntries.Count;")
          replace_once(
              "    private void CompleteMutationReceipt()\n    {\n        if (_activeAuditContext is null ||\n            string.IsNullOrWhiteSpace(_activeMutationBatchId) ||\n            _activeAuditRecordCount == 0)",
              "    private void CompleteMutationReceipt(ApplicationSaveChangesState state)\n    {\n        if (state.ActiveAuditContext is null ||\n            string.IsNullOrWhiteSpace(state.ActiveMutationBatchId) ||\n            state.ActiveAuditRecordCount == 0)")
          replace_once(
              "        if (_activeAuditRecords.Count != _activeAuditRecordCount)",
              "        if (state.ActiveAuditRecords.Count != state.ActiveAuditRecordCount)")
          replace_once(
              "        ApplicationMutationManifest manifest = _manifestBuilder.Build(_activeAuditRecords);",
              "        ApplicationMutationManifest manifest = _manifestBuilder.Build(state.ActiveAuditRecords);")
          replace_once(
              "        LastCompletedReceipt = new ApplicationMutationAuditReceipt(\n            _activeMutationBatchId,\n            _activeAuditRecordCount,",
              "        ApplicationMutationAuditReceipt receipt = new(\n            state.ActiveMutationBatchId,\n            state.ActiveAuditRecordCount,")
          replace_once(
              "            _activeAuditContext.OperationExecutionId,\n            _activeAuditContext.ExecutionAttemptId,\n            _activeAuditContext.DecisionAuditRecordId,\n            _activeAuditContext.CorrelationId,\n            _activeAuditContext.TraceId);\n\n        _activeAuditContext = null;\n        _activeMutationBatchId = null;\n        _activeAuditRecordCount = 0;\n        _activeAuditRecords.Clear();",
              "            state.ActiveAuditContext.OperationExecutionId,\n            state.ActiveAuditContext.ExecutionAttemptId,\n            state.ActiveAuditContext.DecisionAuditRecordId,\n            state.ActiveAuditContext.CorrelationId,\n            state.ActiveAuditContext.TraceId);\n\n        state.LastCompletedReceipt = receipt;\n        lock (_lastCompletedReceiptLock)\n        {\n            _lastCompletedReceipt = receipt;\n        }\n\n        state.ActiveAuditContext = null;\n        state.ActiveMutationBatchId = null;\n        state.ActiveAuditRecordCount = 0;\n        state.ActiveAuditRecords.Clear();")
          replace_once(
              "    private static IApplicationAuditStore ResolveAuditStore(",
              "    private sealed class ApplicationSaveChangesState\n    {\n        public List<AuditEntry> PendingAuditEntries { get; set; } = [];\n\n        public List<AuditRecord> ActiveAuditRecords { get; } = [];\n\n        public ApplicationAuditContext? ActiveAuditContext { get; set; }\n\n        public string? ActiveMutationBatchId { get; set; }\n\n        public int ActiveAuditRecordCount { get; set; }\n\n        public ApplicationMutationAuditReceipt? LastCompletedReceipt { get; set; }\n    }\n\n    private static IApplicationAuditStore ResolveAuditStore(")

          pipeline_path.write_text(text, encoding="utf-8")

          accessor_path = Path("src/ProjectTemplate.Infrastructure/Data/Auditing/IApplicationMutationAuditReceiptAccessor.cs")
          accessor = accessor_path.read_text(encoding="utf-8-sig")
          accessor = accessor.replace(
              "/// Exposes the most recently completed mutation audit receipt for the current scoped save pipeline.",
              "/// Exposes the most recently completed mutation audit receipt across the current scoped save pipeline.")
          accessor = accessor.replace(
              "public interface IApplicationMutationAuditReceiptAccessor\n{",
              "/// <remarks>\n/// When one scope owns multiple <see cref=\"ApplicationDbContext\" /> instances, this compatibility accessor\n/// represents the most recently completed receipt across those contexts. Use\n/// <see cref=\"IApplicationMutationAuditReceiptRegistry\" /> when context-specific receipt identity is required.\n/// </remarks>\npublic interface IApplicationMutationAuditReceiptAccessor\n{")
          accessor_path.write_text(accessor, encoding="utf-8")

          registration_path = Path("src/ProjectTemplate.Infrastructure/Data/Extensions/InfrastructureDataAccessServiceExtensions.cs")
          registration = registration_path.read_text(encoding="utf-8-sig")
          old = """        services.TryAddScoped<IApplicationMutationAuditReceiptAccessor>(serviceProvider =>
            serviceProvider.GetRequiredService<ApplicationSaveChangesPipeline>());
        services.TryAddScoped<ApplicationSaveChangesInterceptor>();
"""
          new = """        services.TryAddScoped<IApplicationMutationAuditReceiptAccessor>(serviceProvider =>
            serviceProvider.GetRequiredService<ApplicationSaveChangesPipeline>());
        services.TryAddScoped<IApplicationMutationAuditReceiptRegistry>(serviceProvider =>
            serviceProvider.GetRequiredService<ApplicationSaveChangesPipeline>());
        services.TryAddScoped<ApplicationSaveChangesInterceptor>();
"""
          if registration.count(old) != 1:
              raise SystemExit("Registration replacement failed")
          registration_path.write_text(registration.replace(old, new, 1), encoding="utf-8")

          transaction_path = Path("src/ProjectTemplate.Infrastructure/Data/Auditing/ApplicationAuditedTransaction.cs")
          transaction = transaction_path.read_text(encoding="utf-8-sig")
          transaction = transaction.replace(
              "    private readonly IApplicationMutationAuditReceiptAccessor _receiptAccessor;\n",
              "    private readonly IApplicationMutationAuditReceiptAccessor _receiptAccessor;\n    private readonly IApplicationMutationAuditReceiptRegistry? _receiptRegistry;\n",
              1)
          old = """    public ApplicationAuditedTransaction(
        ApplicationDbContext dbContext,
        IApplicationMutationAuditReceiptAccessor receiptAccessor)
"""
          new = """    public ApplicationAuditedTransaction(
        ApplicationDbContext dbContext,
        IApplicationMutationAuditReceiptAccessor receiptAccessor,
        IApplicationMutationAuditReceiptRegistry? receiptRegistry = null)
"""
          if transaction.count(old) != 1:
              raise SystemExit("Transaction constructor signature replacement failed")
          transaction = transaction.replace(old, new, 1)
          transaction = transaction.replace(
              "        _dbContext = dbContext;\n        _receiptAccessor = receiptAccessor;\n",
              "        _dbContext = dbContext;\n        _receiptAccessor = receiptAccessor;\n        _receiptRegistry = receiptRegistry;\n",
              1)
          transaction = transaction.replace(
              "ApplicationMutationAuditReceipt? previousReceipt = _receiptAccessor.LastCompletedReceipt;",
              "ApplicationMutationAuditReceipt? previousReceipt = GetLastCompletedReceipt();")
          transaction = transaction.replace(
              "        ApplicationMutationAuditReceipt? currentReceipt = _receiptAccessor.LastCompletedReceipt;\n        return ReferenceEquals(previousReceipt, currentReceipt) ? null : currentReceipt;",
              "        ApplicationMutationAuditReceipt? currentReceipt = GetLastCompletedReceipt();\n        return ReferenceEquals(previousReceipt, currentReceipt) ? null : currentReceipt;",
              1)
          marker = """    private IDbContextTransaction BeginTransaction(IsolationLevel? isolationLevel)
"""
          helper = """    private ApplicationMutationAuditReceipt? GetLastCompletedReceipt()
    {
        return _receiptRegistry?.GetLastCompletedReceipt(_dbContext)
            ?? _receiptAccessor.LastCompletedReceipt;
    }

"""
          if transaction.count(marker) != 1:
              raise SystemExit("Transaction helper insertion failed")
          transaction = transaction.replace(marker, helper + marker, 1)
          transaction_path.write_text(transaction, encoding="utf-8")

      - name: Commit refactor
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No changes remain."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/ProjectTemplate.Infrastructure/Data
          git commit -m "Isolate audit save state per DbContext"
          git push
