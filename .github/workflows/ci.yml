name: CI

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main
      - 'feature/**'
      - 'fix/**'
      - 'docs/**'
      - 'refactor/**'
      - 'test/**'
      - 'chore/**'

  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_VERSION: '10.0.x'
  CONFIGURATION: Release
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest

    if: github.event_name == 'pull_request'

    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Review dependency changes
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
        with:
          fail-on-severity: moderate

  build-validation:
    name: Build validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Display .NET information
        run: dotnet --info

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --configuration ${{ env.CONFIGURATION }} --no-restore

      # Optional: enable later once formatting/analyzer noise is cleaned up.
      - name: Verify formatting
        run: dotnet format --verify-no-changes --verbosity minimal

      - name: Run tests
        shell: pwsh
        run: |
          $testProjects = Get-ChildItem -Path . -Recurse -Filter *.csproj | Where-Object {
              $content = Get-Content $_.FullName -Raw
              $_.BaseName -match 'Tests?$' -or $content -match 'Microsoft\.NET\.Test\.Sdk'
          }

          if (-not $testProjects) {
              Write-Host "No test projects found. Skipping dotnet test."
              exit 0
          }

          foreach ($project in $testProjects) {
              Write-Host "Running tests for $($project.FullName)"
              dotnet test $project.FullName `
                --configuration $env:CONFIGURATION `
                --no-restore `
                --verbosity normal `
                --collect:"XPlat Code Coverage" `
                --logger "trx" `
                --results-directory "./artifacts/test-results"
          }

      - name: Restore local tools
        run: dotnet tool restore

      - name: Generate coverage report
        shell: pwsh
        run: |
          dotnet reportgenerator `
            -reports:"./artifacts/test-results/**/coverage.cobertura.xml" `
            -targetdir:"./artifacts/coverage-report" `
            -reporttypes:"Html;MarkdownSummaryGithub;Cobertura" `
            -assemblyfilters:"+Template.Web;-*.Tests"

      - name: Publish test results artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-results
          path: ./artifacts/test-results
          if-no-files-found: warn

      - name: Publish coverage report artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: ./artifacts/coverage-report
          if-no-files-found: warn

      - name: Enforce initial coverage threshold
        shell: pwsh
        run: |
          $threshold = 60
          $coverageFile = Get-ChildItem -Path "./artifacts/coverage-report" -Recurse -Filter "*.xml" |
            Where-Object { $_.Name -match "Cobertura|coverage" } |
            Select-Object -First 1

          if (-not $coverageFile) {
              Write-Error "Coverage file was not generated."
              exit 1
          }

          [xml]$coverage = Get-Content $coverageFile.FullName
          $lineRate = [double]$coverage.coverage.'line-rate'
          $percentage = [math]::Round($lineRate * 100, 2)

          Write-Host "Line coverage: $percentage%"

          if ($percentage -lt $threshold) {
              Write-Error "Coverage $percentage% is below required threshold of $threshold%."
              exit 1
          }

  codeql-analysis:
    name: CodeQL analysis
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
        with:
          languages: 'actions,csharp'
          build-mode: none

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution for CodeQL
        run: dotnet build --configuration ${{ env.CONFIGURATION }} --no-restore

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
