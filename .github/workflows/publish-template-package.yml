name: Publish Template Package

on:
  push:
    tags:
      - 'v*.*.*'

  workflow_dispatch:
    inputs:
      publish_source:
        description: 'Package source URL used by dotnet nuget push.'
        required: true
        default: 'https://nuget.pkg.github.com/cdcavell/index.json'
      skip_publish:
        description: 'Pack only and skip dotnet nuget push.'
        required: true
        type: boolean
        default: true

permissions:
  contents: read

env:
  CONFIGURATION: Release
  PACKAGE_PROJECT: './NetCoreApplicationTemplate.Template.csproj'
  PACKAGE_OUTPUT: './artifacts/template-package'
 