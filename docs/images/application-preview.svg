<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">NetCoreApplicationTemplate application preview</title>
  <desc id="desc">A simple browser-style preview showing the template landing endpoint and infrastructure focus areas.</desc>
  <rect width="960" height="540" rx="24" fill="#f6f8fa"/>
  <rect x="64" y="64" width="832" height="412" rx="18" fill="#ffffff" stroke="#d0d7de"/>
  <rect x="64" y="64" width="832" height="52" rx="18" fill="#24292f"/>
  <circle cx="96" cy="90" r="7" fill="#ff5f56"/>
  <circle cx="120" cy="90" r="7" fill="#ffbd2e"/>
  <circle cx="144" cy="90" r="7" fill="#27c93f"/>
  <rect x="184" y="78" width="520" height="24" rx="12" fill="#57606a"/>
  <text x="204" y="95" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#f6f8fa">https://localhost:5001/</text>
  <text x="112" y="180" font-family="Segoe UI, Arial, sans-serif" font-size="36" font-weight="700" fill="#24292f">Hello World!</text>
  <text x="112" y="218" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#57606a">Reusable ASP.NET Core application template baseline</text>
  <rect x="112" y="264" width="216" height="86" rx="14" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="136" y="298" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600" fill="#24292f">Secure defaults</text>
  <text x="136" y="326" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#57606a">Headers, auth, rate limits</text>
  <rect x="372" y="264" width="216" height="86" rx="14" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="396" y="298" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600" fill="#24292f">Operational clarity</text>
  <text x="396" y="326" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#57606a">Logging, errors, health</text>
  <rect x="632" y="264" width="216" height="86" rx="14" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="656" y="298" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600" fill="#24292f">Template ready</text>
  <text x="656" y="326" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#57606a">Docs, CI, packaging path</text>
  <text x="112" y="414" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#57606a">Preview image for repository documentation; the starter endpoint is intentionally minimal.</text>
</svg>
