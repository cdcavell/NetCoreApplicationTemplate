name: Format Diagnostics

on:
  pull_request:

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore ./NetCoreApplicationTemplate.slnx --locked-mode

      - name: Show formatting differences
        shell: bash
        run: |
          set +e
          dotnet format ./NetCoreApplicationTemplate.slnx --verify-no-changes --no-restore --verbosity diagnostic > format.log 2>&1
          status=$?
          grep -E "(error|warning|IDE0055|Formatted|formatting)" format.log | tail -n 200 || true
          exit $status
