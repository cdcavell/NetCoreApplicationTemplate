name: Format Diagnostics

on:
  pull_request:

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore ./NetCoreApplicationTemplate.slnx --locked-mode

      - name: Capture formatting differences
        id: format
        continue-on-error: true
        shell: bash
        run: dotnet format ./NetCoreApplicationTemplate.slnx --verify-no-changes --no-restore --verbosity diagnostic > format.log 2>&1

      - name: Upload formatting log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: format-diagnostics
          path: format.log
          if-no-files-found: error
          retention-days: 1

      - name: Enforce formatting result
        if: steps.format.outcome == 'failure'
        run: exit 1
