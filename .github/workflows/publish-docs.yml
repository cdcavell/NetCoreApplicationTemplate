name: Publish Documentation

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: false

env:
  CONFIGURATION: Release
  SOLUTION_FILE: './NetCoreApplicationTemplate.slnx'

jobs:
  build-docs:
    name: Build documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository