name: Version Consistency

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-version-consistency:
    name: Validate version consistency
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Validate version consistency
        shell: pwsh
        env:
          GITHUB_REF_TYPE_VALUE: ${{ github.ref_type }}
          GITHUB_REF_NAME_VALUE: ${{ github.ref_name }}
        run: |
          $arguments = @{}

          if ($env:GITHUB_REF_TYPE_VALUE -eq 'tag') {
              $arguments['TagName'] = $env:GITHUB_REF_NAME_VALUE
          }

          ./scripts/Validate-VersionConsistency.ps1 @arguments
