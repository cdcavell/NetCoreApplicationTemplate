name: Publish Container

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

env:
  IMAGE_NAME: ghcr.io/cdcavell/netcoreapplicationtemplate
  LOCAL_IMAGE_NAME: netcoreapplicationtemplate-release
  TRIVY_IMAGE: aquasec/trivy:0.58.2

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-scan:
    name: Build, scan, and package image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    outputs:
      version: ${{ steps.version.outputs.version }}
      major: ${{ steps.version.outputs.major }}
      is_stable_release: ${{ steps.version.outputs.is_stable_release }}
      local_image: ${{ steps.version.outputs.local_image }}

    steps:
      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Resolve release version
        id: version
        shell: pwsh
        run: |
          $refName = $env:GITHUB_REF_NAME

          if (-not $refName.StartsWith('v', [System.StringComparison]::OrdinalIgnoreCase)) {
              Write-Error "Container publishing requires a semantic version tag matching v*.*.*."
              exit 1
          }

          $version = $refName.Substring(1)
          if ($version -notmatch '^\d+\.\d+\.\d+([-.][0-9A-Za-z.-]+)?$') {
              Write-Error "Tag '$refName' is not a supported semantic version tag."
              exit 1
          }

          $major = $version.Split('.')[0]
          $isStableRelease = $version -match '^\d+\.\d+\.\d+$'
          $localImage = "${env:LOCAL_IMAGE_NAME}:$version"

          "version=$version" >> $env:GITHUB_OUTPUT
          "major=$major" >> $env:GITHUB_OUTPUT
          "is_stable_release=$($isStableRelease.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "local_image=$localImage" >> $env:GITHUB_OUTPUT

      - name: Build container image
        env:
          LOCAL_IMAGE: ${{ steps.version.outputs.local_image }}
        run: |
          docker build \
            --pull \
            --build-arg BUILD_CONFIGURATION=Release \
            --tag "$LOCAL_IMAGE" \
            .

      - name: Prepare release evidence directory
        run: mkdir -p artifacts/container-release .trivy-cache

      - name: Generate vulnerability scan SARIF
        env:
          LOCAL_IMAGE: ${{ steps.version.outputs.local_image }}
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$GITHUB_WORKSPACE/artifacts/container-release:/reports" \
            -v "$GITHUB_WORKSPACE/.trivy-cache:/root/.cache" \
            "$TRIVY_IMAGE" image \
            --format sarif \
            --output /reports/trivy-results.sarif \
            --severity HIGH,CRITICAL \
            --ignore-unfixed=false \
            --exit-code 0 \
            "$LOCAL_IMAGE"

      - name: Upload vulnerability SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          sarif_file: artifacts/container-release/trivy-results.sarif
          category: container-image

      - name: Generate SPDX SBOM
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          LOCAL_IMAGE: ${{ steps.version.outputs.local_image }}
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$GITHUB_WORKSPACE/artifacts/container-release:/reports" \
            -v "$GITHUB_WORKSPACE/.trivy-cache:/root/.cache" \
            "$TRIVY_IMAGE" image \
            --format spdx-json \
            --output "/reports/netcoreapplicationtemplate-$RELEASE_VERSION.spdx.json" \
            --exit-code 0 \
            "$LOCAL_IMAGE"

      - name: Upload release evidence artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: container-release-evidence
          path: artifacts/container-release
          if-no-files-found: error
          retention-days: 30

      - name: Enforce container vulnerability threshold
        env:
          LOCAL_IMAGE: ${{ steps.version.outputs.local_image }}
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$GITHUB_WORKSPACE/.trivy-cache:/root/.cache" \
            "$TRIVY_IMAGE" image \
            --format table \
            --severity HIGH,CRITICAL \
            --ignore-unfixed=false \
            --exit-code 1 \
            "$LOCAL_IMAGE"

      - name: Save scanned image
        env:
          LOCAL_IMAGE: ${{ steps.version.outputs.local_image }}
        run: docker save "$LOCAL_IMAGE" --output artifacts/container-image.tar

      - name: Upload scanned image artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: container-image
          path: artifacts/container-image.tar
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish signed container image
    runs-on: ubuntu-latest
    needs: build-scan

    environment:
      name: container-publish

    permissions:
      actions: read
      attestations: write
      contents: write
      id-token: write
      packages: write

    steps:
      - name: Download scanned image artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: container-image
          path: artifacts

      - name: Download release evidence artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: container-release-evidence
          path: artifacts/container-release

      - name: Load scanned image
        run: docker load --input artifacts/container-image.tar

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push image
        id: push
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ needs.build-scan.outputs.version }}
          RELEASE_MAJOR: ${{ needs.build-scan.outputs.major }}
          IS_STABLE_RELEASE: ${{ needs.build-scan.outputs.is_stable_release }}
          LOCAL_IMAGE: ${{ needs.build-scan.outputs.local_image }}
          TARGET_IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: |
          $version = $env:RELEASE_VERSION
          $major = $env:RELEASE_MAJOR
          $isStableRelease = $env:IS_STABLE_RELEASE -eq 'true'
          $localImage = $env:LOCAL_IMAGE
          $imageName = $env:TARGET_IMAGE_NAME

          $tags = [System.Collections.Generic.List[string]]::new()
          $tags.Add("${imageName}:$version")

          if ($isStableRelease) {
              $tags.Add("${imageName}:$major")
              $tags.Add("${imageName}:latest")
          }

          foreach ($tag in $tags) {
              docker tag $localImage $tag
              docker push $tag
          }

          $digest = docker buildx imagetools inspect "${imageName}:$version" --format '{{.Manifest.Digest}}'
          if ([string]::IsNullOrWhiteSpace($digest)) {
              Write-Error "Unable to resolve pushed image digest."
              exit 1
          }

          $digestRef = "${imageName}@$digest"
          "digest=$digest" >> $env:GITHUB_OUTPUT
          "digest_ref=$digestRef" >> $env:GITHUB_OUTPUT
          "tags=$($tags -join ', ')" >> $env:GITHUB_OUTPUT

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image digest
        env:
          DIGEST_REF: ${{ steps.push.outputs.digest_ref }}
        run: cosign sign --yes "$DIGEST_REF"

      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Publish release evidence
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
          DIGEST_REF: ${{ steps.push.outputs.digest_ref }}
          PUBLISHED_TAGS: ${{ steps.push.outputs.tags }}
        run: |
          $tag = $env:RELEASE_TAG
          $digestRef = $env:DIGEST_REF
          $tags = $env:PUBLISHED_TAGS
          $notesPath = 'artifacts/container-release/release-notes.md'

          @"
          Container release evidence for `$tag`.

          Published image: `${digestRef}`

          Published tags: `${tags}`

          Attached evidence:

          - Trivy vulnerability scan SARIF.
          - SPDX JSON SBOM.
          - GitHub artifact provenance attestation.
          - Cosign keyless image signature for the pushed digest.
          "@ | Set-Content -Path $notesPath -Encoding UTF8

          gh release view $tag --repo $env:GH_REPO 1>$null 2>$null

          if ($LASTEXITCODE -eq 0) {
              gh release upload $tag artifacts/container-release/* --clobber --repo $env:GH_REPO
              if ($LASTEXITCODE -ne 0) {
                  exit $LASTEXITCODE
              }
          }
          else {
              gh release create $tag artifacts/container-release/* --title "Release $tag" --notes-file $notesPath --repo $env:GH_REPO
              if ($LASTEXITCODE -ne 0) {
                  exit $LASTEXITCODE
              }
          }
